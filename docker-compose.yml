version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: task_postgres
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: task_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: task_backend
    depends_on:
      - postgres
      - redis
    environment:
      APP_NAME: Task API
      APP_ENV: development
      API_V1_PREFIX: /api/v1
      SECRET_KEY: change_this_to_a_long_random_secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/tasks_db
      FRONTEND_ORIGIN: http://localhost:5173
      EXTERNAL_API_URL: https://httpbin.org/status/200
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: task_frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"

volumes:
  postgres_data:
